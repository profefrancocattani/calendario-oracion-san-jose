<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Previa - San Jose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Printer, Eye, EyeOff, Filter, ChevronLeft, ChevronRight, Church, Users, Calendar as CalendarIcon, X, BookOpen, Heart } from 'lucide-react';

        // Icono personalizado de manos en oración (SVG)
        const PrayingHandsIcon = ({ size = 24, className = "" }) => (
          <svg 
            width={size} 
            height={size} 
            viewBox="0 0 24 24" 
            fill="none" 
            stroke="currentColor" 
            strokeWidth="2" 
            strokeLinecap="round" 
            strokeLinejoin="round" 
            className={className}
          >
            <path d="M18 8c0-2.2-1.8-4-4-4s-4 1.8-4 4v10l-4-4" />
            <path d="M6 8c0-2.2 1.8-4 4-4s4 1.8 4 4v10l4-4" />
            <path d="M10 22h4" />
          </svg>
        );

        // --- Configuración y Colores ---
        const COLORS = {
            azulInst: '#1F4E79',     // Azul Colegio
            rojoLadrillo: '#C0504D', // Rojo Institucional
            dorado: '#D4AF37',       // Toque litúrgico
            blanco: '#FFFFFF',
            negro: '#2D3436',
            grisClaro: '#F8F9FA',
            amarillo: '#FFF9C4',     // Tema/Oración
            celesteFondo: '#E3F2FD', // Convivencia/Alegre
            rosaFondo: '#FCE4EC',    // Feriados/Liturgia
            verdeProfe: '#2D6A4F',
            celesteProfe: '#0077B6',
            azulReceso: '#E1F5FE'
        };

        const DAYS_OF_WEEK = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
        const LEMA_COMUN = "“Vivir, Contemplar y Anunciar al mundo el Amor de Dios”";

        // --- Generadores de Datos ---
        const generateMonthTemplate = (daysInMonth, startDay, specialEvents = {}, includePlaceholders = true) => {
            const events = {};
            for (let i = 1; i <= daysInMonth; i++) {
                const dayOfWeek = (startDay + i - 1) % 7;
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                if (specialEvents[i]) {
                    events[i] = specialEvents[i];
                } else if (!isWeekend && includePlaceholders) {
                    events[i] = { profe: 'Responsable', tema: 'Propuesta del día...' };
                }
            }
            return events;
        };

        // --- Datos del Calendario (Fusionados) ---
        const calendarData = {
            "Marzo 2026": {
                daysInMonth: 31,
                startDay: 0,
                mision: LEMA_COMUN,
                events: generateMonthTemplate(31, 0, {
                    10: {
                        profe: 'Achar',
                        pastoral: 'Caminar livianos',
                        tema: `“Echen todas sus preocupaciones sobre él, porque Dios cuida de ustedes” (1 Pedro 5:7).\n\nTe invito a vivir este día tomando lo que te hace bien y soltando lo que ya no necesitás. El camino de Cuaresma nos pide caminar más livianos.\n\nPregunta/Acción: ¿Qué actitud o enojo podrías soltar hoy para sentirte más liviano?`
                    },
                    11: {
                        profe: 'Barrios',
                        pastoral: 'Permanecer en su Amor',
                        tema: `“Permanezcan en mi amor. El que permanece en mí da fruto abundante” (Juan 15, 9-10).\n\nAmar nos vuelve fecundos. Prepararnos para vivir la entrega de Jesús es elegir permanecer en su amor, no sólo con palabras, sino con gestos concretos.\n\nPregunta/Acción: ¿Qué gestos de amor nos podemos regalar hoy como curso?`
                    },
                    12: {
                        profe: 'Cernadas',
                        pastoral: 'Confiar como José',
                        tema: `“José, hijo de David, no temas recibir a María, porque lo que ha sido engendrado en ella es del Espíritu Santo” (Mt 1, 20).\n\nA veces sentimos que tenemos todo controlado y de golpe algo nos cambia todo. José confió cuando sus planes se dieron vuelta por completo, dándonos el ejemplo de que confiar en Dios es la respuesta cuando no entendemos algo.\n\nPregunta/Acción: ¿Qué situaciones nos generan ansiedad hoy? Entreguémosle a Dios con confianza nuestras preocupaciones diarias.`
                    },
                    13: {
                        profe: 'de Latorre',
                        pastoral: 'Buscar en el lugar correcto',
                        tema: `“Al despertar, José hizo lo que el Ángel del Señor le había mandado y tomó consigo a María” (Mateo 1, 24).\n\nJosé elige el silencio para escuchar lo que realmente importa. Que en esta Cuaresma no tengamos miedo de buscar en nuestro propio corazón.\n\nPregunta/Acción: Pensemos en una persona de nuestro entorno que nos dé calma y claridad cuando estamos confundidos. ¿Cómo podemos tomar esos buenos consejos hoy?`
                    },
                    16: { 
                        profe: 'Ballan', 
                        pastoral: 'Jesús y el hijo del funcionario',
                        tema: `“Jesús volvió a Galilea. Cuando llegó, un funcionario real fue a su encuentro y le suplicó que bajara a curar a su hijo, que estaba muy enfermo. Jesús le dijo: ‘Puedes volver tranquilo, tu hijo vive’. El hombre creyó en la palabra de Jesús y se puso en camino.”​ (Juan 4, 46‑50)\n\nEn este pasaje aparece un padre desesperado, que hace lo único que puede hacer: ir a buscar ayuda para su hijo y aferrarse a una palabra que le devuelva la esperanza. Jesús no le da una prueba ni un milagro “a la vista”; le regala solo una frase: “Tu hijo vive”. Lo impresionante es que este hombre se fía de esa palabra y se pone en camino, apoyado únicamente en la confianza.\n\nDios Padre bueno, al comenzar este día queremos ponernos en tu presencia y abrirte el corazón. Te pedimos que, como a ese padre del Evangelio, nos regales la gracia de confiar en la palabra de tu Hijo. Te lo pedimos por Jesucristo nuestro Señor. Amén.` 
                    },
                    17: { 
                        profe: 'Bonifacio', 
                        pastoral: 'Levantate y caminá',
                        tema: `“Había un hombre que hacía treinta y ocho años que estaba enfermo. Jesús le dijo: ‘Levántate, agarra tu camilla y camina’. Y al instante aquel hombre quedó sano, tomó su camilla y se puso a caminar.”​ (Juan 5, 5‑9)\n\nEn este pasaje del Evangelio aparece un hombre que se acostumbró a vivir paralizado y repitiendo siempre la misma frase: “no tengo a nadie”. Jesús se acerca justo ahí, donde hay desánimo y soledad, y no se queda en la queja; le propone algo nuevo: levantarse, cargar con su camilla y empezar de nuevo. \n\nSeñor Jesús, al iniciar este día nos presentamos ante vos con lo que somos y lo que traemos en el corazón. Te pedimos que en este día nos hables al corazón y nos digas también a nosotros: “Levantate y caminá”, para que no nos quedemos quietos frente a las dificultades. Que tu Espíritu nos enseñe a estudiar con responsabilidad, a respetarnos, a pedir ayuda a tiempo y a ser, en nuestra escuela, signo de tu amor para los demás. Te lo pedimos a vos, que vivís y reinás por los siglos de los siglos. Amén.` 
                    },
                    18: { 
                        profe: 'Attwell', 
                        pastoral: 'Unidos al Padre',
                        tema: `“Yo les aseguro: El Hijo no puede hacer nada por su cuenta y sólo hace lo que le ve hacer al Padre; lo que hace el Padre también lo hace el Hijo. El Padre ama al Hijo y le manifiesta todo lo que hace; le manifestará obras todavía mayores que éstas, para asombro de ustedes. Así como el Padre resucita a los muertos y les da la vida, así también el Hijo da la vida a quien él quiere dársela”. (Juan 5, 19‑21)\n\nEl Evangelio nos muestra a Jesús totalmente unido al Padre, viviendo una confianza tan profunda que no hace nada “por su cuenta”, sino en sintonía con su amor y su modo de mirar la vida. También nosotros estamos invitados a aprender a vivir así: no desde “me las arreglo solo”, sino desde la confianza en un Dios que nos ama, nos guía y nos muestra un camino. ​\n\nSeñor Jesús, que al empezar este día podamos recibir estas palabras como una promesa. Te pedimos que nos des esa vida que sólo vos podés dar y que, como escuela, seamos un lugar donde se nota que el Padre y el Hijo siguen actuando hoy en medio de nosotros.` 
                    },
                    19: { type: 'feriado', event: '⛪ Fiesta Patronal San José', pastoral: 'Solemnidad de San José' },
                    20: { 
                        profe: 'Barrios', 
                        pastoral: 'Cuidar como José',
                        tema: `Padre bueno, venimos de celebrar a San José y todavía tenemos presentes en el corazón las palabras, los gestos y los encuentros que vivimos juntos como comunidad en este tiempo de preparación a nuestras fiestas patronales. Gracias por el ejemplo sencillo y firme de San José y por mostrarnos en él a un hombre que supo escuchar tus sueños y confiar en tu plan. \n\nHoy, al día siguiente de su fiesta, queremos dejar este día en tus manos y te pedimos que, como a José, nos enseñes a trabajar en silencio, a cuidar a los demás y a construir con paciencia, día a día, el futuro que soñás para nosotros. Que lo vivido en estas fiestas patronales no se quede solo en un lindo recuerdo, sino que nos empuje a vivir este año con más confianza, más servicio y más fe. Amén.` 
                    },
                    23: { type: 'feriado', event: '🇦🇷 Feriado (Día Nacional de la Memoria)' },
                    24: { type: 'feriado', event: '🇦🇷 Feriado (Día Nacional de la Memoria)' },
                  25: {
  profe: 'Basta',
  pastoral: 'Fe que se hace obras',
  tema: `Carta de Santiago (2, 17-18): Si un hermano o una hermana no tienen ropa ni lo necesario para comer cada día, y alguno de ustedes les dice: “Que les vaya bien, abríguense y coman rico”, pero no les da lo que necesitan para vivir, ¿de qué sirve?
Así también la fe, si no se traduce en obras, no sirve. Quizás alguien diga: “Tú tienes fe, y yo tengo obras”. Muéstrame tu fe sin tus obras, y yo te mostraré mi fe por medio de mis obras.

A veces nos quedamos en el "yo soy buena persona" o "yo creo en el compañerismo", pero si pasamos de largo frente al dolor del otro, nos falta algo. El compromiso grupal se mide en en el movimiento, en poner el cuerpo cuando hace falta una mano. 
Oración: Jesús, danos fuerza para que nuestro paso por la escuela hoy deje una marca positiva. Que sepamos transformar lo que creemos en acciones que ayuden a los demás. Amén.`
},
26: {
  profe: 'Cernadas',
  pastoral: 'Manos que levantan',
  tema: `Eclesiastés (4, 9-10): "Valen más dos que uno solo... Porque si uno cae, el otro lo levanta. ¡Pero pobre del que está solo y se cae, porque no tiene a nadie que lo ayude!".

A veces creemos que la autonomía es no necesitar a nadie. Pero la realidad es que el mundo tiene muchos desafíos y, tarde o temprano, todos tropezamos. El verdadero desafío no es evitar la caída, sino haber construido vínculos lo suficientemente sólidos para que siempre haya una mano extendida cerca. ¿Quiénes son hoy sus "manos extendidas" en este patio y en tu vida?

Oración: Jesús, gracias por los amigos y compañeros que nos regala la escuela. Ayudanos a ser esa persona que levanta al otro cuando las cosas se ponen difíciles. Amén.`
},
27: {
  profe: 'Cerezo',
  pastoral: 'El prójimo cotidiano',
  tema: `Mateo (22, 35-39): "Amarás a tu prójimo como a vos mismo". 

35 Y uno de ellos, intérprete de la ley, preguntó por tentarle, diciendo: 36 Maestro, ¿cuál es el gran mandamiento en la ley? 37 Jesús le dijo: Amarás al Señor tu Dios con todo tu corazón, y con toda tu alma, y con toda tu mente. 38 Este es el primer y más grande mandamiento. 39 Y el segundo es semejante: Amarás a tu prójimo como a ti mismo. 

El "prójimo" no es alguien que elegimos. Es el que te tocó al lado en la formación, el que te cae pesado, el que piensa distinto. Respetar al otro no es un sentimiento lindo, es una decisión: elijo tratarlo bien porque su dignidad vale lo mismo que la mía. 
Oración: Jesús, abrinós los ojos para ver a los demás no como obstáculos, sino como compañeros de camino. Amén.`
},
30: {
  profe: 'Carrizo',
  pastoral: 'Unidos al Padre',
  tema: `Jn 7, 1-2.10.25-30: “Después de esto, Jesús andaba por Galilea; no quería pasar por Judea porque las autoridades judías lo querían matar. Se acercaba la fiesta judía de las Enramadas. Cuando sus hermanos subieron a la fiesta, él también subió, pero en secreto, sin hacerse notar demasiado.
Algunos de Jerusalén decían: ‘¿No es este el que querían matar? Miren cómo habla con total libertad y nadie le dice nada. ¿No será que las autoridades se dieron cuenta de que de verdad es el Mesías? Pero nosotros sabemos de dónde viene este; en cambio, cuando venga el Mesías, nadie sabrá de dónde viene’.
Entonces Jesús, que estaba enseñando en el Templo, gritó: ‘¿Así que ustedes dicen que me conocen y saben de dónde vengo? Yo no vine por cuenta propia: el que me envió es verdadero, y ustedes no lo conocen. Yo sí lo conozco, porque vengo de él y fue él quien me envió’. Entonces quisieron arrestarlo, pero nadie le puso la mano encima, porque todavía no había llegado su hora.”

Jesús, en el Evangelio, me invitas a contemplar tu unión con el Padre: no haces tu propia voluntad, sino la voluntad de quien te ha enviado; vivís de esta certeza de ser amado y de tener una misión. ¿Cómo puedo hoy alinear mi voluntad con la tuya Señor, y cumplir la misión que me has confiado?

Oración: Recibe, Señor, mi día, mis gestos y mis intenciones, para que todo contribuya a la reconciliación y al bien de todos aquellos que pones en mi camino. Amén.`
},
31: {
  profe: 'Buzzo',
  pastoral: 'Escuchar antes de juzgar',
  tema: `Jn 7, 51: Entre los que discutían quién era realmente Jesús, Nicodemo alza la voz: «¿Acaso nuestra Ley permite juzgar a un hombre sin antes escucharlo y sin averiguar lo que está haciendo?»

Damos gracias por este nuevo día y por la oportunidad de escuchar con el corazón abierto. El Evangelio nos recuerda que antes de juzgar, hay que escuchar. ¿Cuántas divisiones, conflictos e incluso guerras nacen porque nos negamos a escuchar al otro? La paz comienza cuando elegimos el diálogo en lugar de la condena precipitada, cuando buscamos comprender antes de atacar.

¿Qué situaciones o personas me piden hoy que escuche verdaderamente, antes de formarme una opinión o de actuar? ¿Cómo puedo ser instrumento de diálogo donde hay discusión?

Oración: Jesús, enséñanos a escuchar antes de juzgar, a abrir el corazón y a elegir siempre el camino del diálogo. Que en nuestra escuela se note que buscamos la paz con nuestros gestos y palabras. Amén.`
}
                })
               },
    "Abril 2026": { 
        daysInMonth: 30, 
        startDay: 3, 
        mision: LEMA_COMUN, 
        events: generateMonthTemplate(30, 3, { 
            1: { 
                profe: 'de Latorre', 
                pastoral: 'Vida en abundancia',
                tema: `Cita: “Yo he venido para que tengan vida, y la tengan en abundancia.” (Juan 10,10).\n\nReflexión: La Pascua significa vivir con mucho sentido y alegría. Vos podés ser el reflejo de esa vida nueva dentro de tu curso cuando “tiramos juntos para adelante”.\n\nOración: Señor, llená nuestro corazón de energía y de vida abundante. Enseñanos a cambiar el clima del aula con nuestra alegría. Amén.` 
            },
            2: { type: 'feriado', event: 'Día del Veterano de Malvinas / Jueves Santo', pastoral: 'Jueves Santo' },
            3: { type: 'feriado', event: 'Viernes Santo', pastoral: 'Pasión del Señor' },
            5: { pastoral: 'Pascua de Resurrección' },
            6: { 
                profe: 'Duran', 
                pastoral: 'La tumba vacía',
                tema: `Cita: "No se asusten. Ustedes buscan a Jesús de Nazaret, el crucificado. Ha resucitado, no está aquí." (Mc 16, 6).\n\nReflexión: Ayer celebramos la Pascua, el momento de mayor esperanza. A veces creemos que un mal comienzo o un problema difícil ya tienen la última palabra. Pero la tumba vacía nos demuestra que siempre hay revancha y una oportunidad clara para empezar de nuevo.\n\nOración: Jesús, gracias por la esperanza de la Pascua. Danos fuerza para ver oportunidades donde hoy parece que hay muros. Amén.` 
            },
            7: { 
                profe: 'Gallo', 
                pastoral: 'Correr la piedra',
                tema: `Cita bíblica: "Al atardecer de aquel primer día de la semana, los discípulos estaban con las puertas cerradas por miedo" (Jn 20, 19).\n\nReflexión: Ayer hablábamos de que siempre hay revancha. Fíjense que los amigos de Jesús estaban encerrados y asustados, algo que nos pasa bastante. El miedo a equivocarnos, a comprometernos o al qué dirán nos paraliza. “Correr la piedra” significa animarse a salir de ese lugar seguro.\n\nOración: Señor, quitá nuestros miedos. Danos valentía para dar el primer paso y ofrecer lo mejor de nosotros a los demás. Amén.` 
            },
            8: { 
                profe: 'Iriarte', 
                pastoral: 'Levantar la mirada',
                tema: `Cita: "Se les abrieron los ojos y lo reconocieron, pero él desapareció de su vista" (Lc 24, 31).\n\nReflexión: Hoy nos toca levantar la mirada mientras caminamos. En medio del apuro nos puede pasar que ignoramos a los que tenemos al lado. Dios se hace presente en cada persona de nuestra vida. Hoy especialmente podemos reconocer a nuestros profes y agradecerles por su acompañamiento diario.\n\nOración: Señor, abrí nuestros ojos para descubrirte en el esfuerzo y en el amor de nuestros profesores durante este día. Amén.` 
            },
            9: { 
                profe: 'Coronel', 
                pastoral: 'La paz esté con ustedes',
                tema: `Cita: "Jesús se presentó en medio de ellos y les dijo: «La paz esté con ustedes»" (Jn 20, 19).\n\nReflexión: Estuvimos charlando sobre la sorpresa, la valentía y la mirada atenta. Cuando logramos todo eso, llega una calma especial. Esa paz sirve para no hacer crecer las peleas, frenar los malos tratos y mejorar nuestra convivencia.\n\nOración: Jesús resucitado, regalanos la paz y ayudanos a ser personas que frenan los conflictos en lugar de agrandarlos. Amén.` 
            },
            10: { 
                profe: 'Elizari', 
                pastoral: 'Compartir lo vivido',
                tema: `Cita bíblica: "Ellos contaron lo que les había pasado en el camino" (Lc 24, 35).\n\nReflexión: Cerramos esta semana de Pascua. Todo este recorrido tiene un destino final: compartirlo. Que podamos vivir una alegría que se contagia y lograr que se note en todo el colegio.\n\nOración: Señor, gracias por acompañarnos estos días. Que la fuerza de lo nuevo nos acompañe también en nuestras casas para llevarle alegría a nuestras familias. Amén.` 
            },
            13: { 
                profe: 'Godoy', 
                pastoral: 'Alegría nueva',
                tema: `Cita: “Los discípulos se llenaron de alegría al ver al Señor.” (Juan 20,20).\n\nReflexión: Jesús resucitado trae alegría nueva. Aunque vengamos cansados o sin fuerzas, siempre tenemos la chance de arrancar de cero. La Pascua significa recuperar la esperanza y ponerle energías nuevas a nuestros proyectos y a nuestros sueños. Un curso alegre trabaja mejor, se ayuda más y hace que las mañanas sean más fáciles para todos.\n\nOración: Señor, danos fuerza y alegría para empezar esta semana. Ayudanos a armar un buen clima en el colegio hoy. Amén.` 
            },
            14: { 
                profe: 'Millauro', 
                pastoral: 'Palabras que salvan',
                tema: `Cita: “¿No ardía nuestro corazón mientras nos hablaba en el camino?” (Lucas 24,32).\n\nReflexión: Jesús sigue hablándonos hoy. A veces, una palabra buena te cambia el día por completo. En la escuela, lo que decís tiene mucho peso. Podemos lastimar a un compañero con una burla o levantarle el ánimo con una palabra a favor.\n\nOración: Jesús, enseñanos a usar nuestras palabras para hacer el bien. Que sepamos escuchar a los demás con respeto y atención. Amén.` 
            },
            15: { 
                profe: 'Pereyra', 
                pastoral: 'Reconocerlo al partir el pan',
                tema: `Cita: “Lo reconocieron al partir el pan.” (Lucas 24,35).\n\nReflexión: Jesús se hace presente cuando nos reunimos en su nombre. Eso también nos pasa en la escuela. En el recreo o en clase, lo reconocés cuando compartís tus cosas, cuando cuidás al que está solo y cuando celebramos los logros de los demás. Hacer grupo de verdad implica mirar quién quedó afuera y sumarlo.\n\nOración: Señor, danos ojos para ver quién necesita compañía. Ayudanos a integrar a todos en nuestro curso sin dejar a nadie afuera. Amén.` 
            },
            16: { 
                profe: 'Parma', 
                pastoral: 'Compañía invisible',
                tema: `Cita: “Jesús mismo se acercó y comenzó a caminar con ellos.” (Lucas 24,15).\n\nReflexión: Jesús te acompaña siempre, aunque a veces no lo veas. Tener esa certeza te da fuerza para caminar los días más pesados. Vos también podés ser esa compañía invisible para un amigo. Prestar una oreja o solamente acompañar en silencio ayuda un montón a despejar la cabeza.\n\nOración: Jesús, gracias por caminar siempre al lado nuestro. Enseñanos a acompañar a nuestros amigos cuando nos necesitan. Amén.` 
            },
            17: { 
                profe: 'Pita', 
                pastoral: 'Anunciar lo bueno',
                tema: `Cita: “Vayan por todo el mundo y anuncien la Buena Noticia.” (Marcos 16,15).\n\nReflexión: La alegría de la Pascua se comparte siempre. Podés anunciar lo bueno con actitudes pequeñas. El amor siempre tiene la última palabra y lo podemos demostrar hoy mismo en nuestra cotidianeidad.\n\nOración: Señor, danos valentía para frenar lo malo y multiplicar lo bueno. Que terminemos la semana contagiando alegría a los demás. Amén.` 
            },
            20: { 
                profe: 'Ragaini', 
                pastoral: 'Levantar al otro',
                tema: `Cita: "Valen más dos que uno solo... Porque si uno cae, el otro lo levanta." (Eclesiastés 4, 9-10).\n\nReflexión: Todos tropezamos en algún momento. Caminar acompañado y rodearnos de personas que nos valoran nos permite sostenernos cuando nos cuesta arrancar. El gran desafío diario implica construir lazos fuertes para tener siempre a alguien cerca.\n\nOración: Jesús, gracias por los amigos que nos regala la escuela todos los días. Ayudanos a levantar a nuestros compañeros cuando más lo necesitan.` 
            },
            21: { 
                profe: 'Suetti', 
                pastoral: 'Vida en abundancia',
                tema: `Cita: “Yo he venido para que tengan vida, y la tengan en abundancia.” (Juan 10,10).\n\nReflexión: Vivir en serio significa llenarse de energía y buscarle sentido a todo lo que hacés. Podemos contagiar esa vida abundante cuando elegimos levantarnos una vez más después de cada caída y cuando ponemos el corazón incluso en las tareas más sencillas.\n\nOración: Señor, llená nuestro corazón de energía para encarar el día. Enseñanos a cambiar el clima del aula con nuestra alegría. Amén.` 
            },
            22: { 
                profe: 'Ponce Lopez', 
                pastoral: 'Diversidad de dones',
                tema: `Cita: «Hay diversidad de dones, pero un mismo Espíritu; diversidad de servicios, pero un mismo Señor.» (1 Corintios 12,4-5)\n\nReflexión: Para hacer equipo y caminar a la par, hace falta respetarse. En el curso tenés compañeros con gustos, ideas y ritmos diferentes a los tuyos. Escuchar al otro y armar proyectos juntos te hace crecer muchísimo más.\n\nOración: Jesús, enseñanos a trabajar en equipo respetando siempre al que piensa distinto. Que aprendamos a caminar juntos para armar un curso muy unido. Amén.` 
            },
            23: { 
                profe: 'Rodriguez', 
                pastoral: 'Aprender del otro',
                tema: `Cita: «Que sean perfectamente uno, y así el mundo creerá que tú me has enviado.» (Juan 17,23)\n\nReflexión: En los vínculos con los demás es donde más crecemos y aprendemos. En la escuela importa estudiar y también importa aprender a pedir perdón, a escuchar y a tratar bien al compañero de al lado. Tus compañeros forman parte de tu camino y te enseñan cosas nuevas todos los días.\n\nOración: Señor, danos paciencia para aprender de los que nos rodean. Que sepamos cuidar nuestros vínculos para caminar siempre hacia adelante. Amén.` 
            },
            24: { 
                profe: 'Ruiz', 
                pastoral: 'Amigos',
                tema: `Cita: "Ya no los llamo siervos, sino amigos." (Juan 15,15).\n\nReflexión: Jesús te busca y te elige como amigo. Un verdadero amigo te empuja a crecer y nos frena cuando nos estamos equivocando. Elegí construir relaciones sanas donde podés hablar libremente y donde te sientas sentirte acompañado y cuidado.\n\nOración: Jesús, gracias por elegirnos como amigos y darnos una alegría plena. Bendecinos para que caminemos juntos todo el año. Amén.` 
            },
            27: { 
                profe: 'Torretta', 
                pastoral: 'Sembrar la paz',
                tema: `Cita: “La paz esté con ustedes.” (Juan 20,19).\n\nReflexión: Jesús resucitado trae una paz profunda para todos. Llevar paz al aula significa saber cortar los conflictos y reaccionar bien cuando algo sale mal. Hoy podés sembrar esa paz con una actitud amable o un gesto concreto para aflojar las tensiones del día.\n\nOración: Señor, danos calma para resolver nuestros problemas sin gritar. Ayudanos a llevar tu paz a cada rincón de la escuela hoy. Amén.` 
            },
            28: { 
                profe: 'Weiman', 
                pastoral: 'Dar lo mejor',
                tema: `Cita: “Como el Padre me envió, yo también los envío a ustedes.” (Juan 20,21).\n\nReflexión: Jesús acompaña a quienes están dispuestas a dar lo mejor y a intentarlo todos los días. Él confía plenamente en tu capacidad de amar y de crecer como persona. Tenés todo lo necesario para armar cosas grandes en tu curso y ayudar a los demás.\n\nOración: Jesús, gracias por confiar en nuestras capacidades y empujarnos a crecer. Danos fuerza para dar lo mejor de nosotros en cada clase. Amén.` 
            },
            29: { 
                profe: 'San Juan', 
                pastoral: 'Llamar por el nombre',
                tema: `Cita: “Jesús le dijo: ¡María! Ella se volvió y le dijo en hebreo: ¡Rabbuní!, que significa maestro.” (Juan 20,16-17).\n\nReflexión: Jesús se acerca y te llama por tu nombre con mucha ternura. Llamar al otro por su nombre rompe el hielo, genera cercanía y demuestra nos reconocemos mutuamente.\n\nOración: Señor, danos un corazón alegre para terminar la semana con fuerza. Que sepamos mirar y tratar a todos con respeto. Amén.` 
            },
            30: { 
                profe: 'Sanchez', 
                pastoral: 'Multiplicar la alegría',
                tema: `Cita: “Los discípulos se alegraron al ver al Señor. Jesús les dijo otra vez: La paz esté con ustedes.” (Juan 20,20-21).\n\nReflexión: La alegría de la Pascua se multiplica rápido cuando la compartimos con los demás. Terminar la semana contagiando buena onda con una sonrisa o una palabra buena transforma cualquier día pesado en uno excelente.\n\nOración: Señor, danos un corazón alegre para terminar la semana con fuerza. Que sepamos compartir tu luz con todos los que nos rodean. Amén.` 
            }
        })
            },
            "Mayo 2026": {
                daysInMonth: 31,
                startDay: 5,
                mision: LEMA_COMUN,
                events: generateMonthTemplate(31, 5, {

                    5: { profe: 'Barrios', tema: 'Propuesta del día...' },
                    6: { profe: 'Silva', tema: 'Propuesta del día...' },
                    7: { profe: 'Cerezo', tema: 'Propuesta del día...' },
                    8: { profe: 'Taddei', tema: 'Propuesta del día...' },
                    11: { profe: 'Calandria', tema: 'Propuesta del día...' },
                    12: { profe: 'Basta', tema: 'Propuesta del día...' },
                    13: { profe: 'Attwell', tema: 'Propuesta del día...' },

                    15: { profe: 'de Latorre', tema: 'Propuesta del día...' },
                    18: { profe: 'Duran', tema: 'Propuesta del día...' },

                    25: { type: 'feriado', event: 'Revolución de Mayo' },

                events: generateMonthTemplate(30, 1, {

                    2: { profe: 'Parma', tema: 'Propuesta del día...' },
                    3: { profe: 'Iriarte', tema: 'Propuesta del día...' },
                    4: { profe: 'Ragaini', tema: 'Propuesta del día...' },
                    5: { profe: 'Pita', tema: 'Propuesta del día...' },
                    8: { profe: 'Pereyra', tema: 'Propuesta del día...' },
                    9: { profe: 'Suetti', tema: 'Propuesta del día...' },
                    10: { profe: 'Ponce Lopez', tema: 'Propuesta del día...' },
                    11: { profe: 'Rodriguez', tema: 'Propuesta del día...' },
                    12: { profe: 'Ruiz', tema: 'Propuesta del día...' },
                    15: { type: 'feriado', event: 'Paso a la Inmortalidad de Güemes' },
                    16: { profe: 'Weiman', tema: 'Propuesta del día...' },
                    17: { profe: 'San Juan', tema: 'Propuesta del día...' },
                    18: { profe: 'Sanchez', tema: 'Propuesta del día...' },
                    19: { profe: 'Torretta', tema: 'Propuesta del día...' },

                    22: { profe: 'Ballan', tema: 'Propuesta del día...' },

                events: {
                    ...generateMonthTemplate(31, 3, {

                        13: { profe: 'Gallo', tema: 'Propuesta del día...' },
                        14: { profe: 'Millauro', tema: 'Propuesta del día...' },
                        15: { profe: 'Iriarte', tema: 'Propuesta del día...' },
                        16: { profe: 'Parma', tema: 'Propuesta del día...' },
                        17: { profe: 'Elizari', tema: 'Propuesta del día...' },
                    }),
                    ...Object.fromEntries(Array.from({ length: 12 }, (_, i) => [i + 20, { type: 'receso', event: 'Receso Invernal' }]))
                }

                daysInMonth: 31,

                })
            },

                daysInMonth: 30,
                startDay: 2,
                mision: LEMA_COMUN,
                events: generateMonthTemplate(30, 2, {

                    21: { type: 'feriado', event: 'Día del Estudiante / Primavera' }
                })
            },

                startDay: 4,

                events: generateMonthTemplate(31, 4, {
                    12: { type: 'feriado', event: 'Día del Respeto a la Diversidad Cultural' }
                })
            },
            "Noviembre 2026": {
                daysInMonth: 30,
                startDay: 0,
                mision: LEMA_COMUN,
                events: generateMonthTemplate(30, 0, {
                    20: { type: 'feriado', event: 'Día de la Soberanía Nacional' },
                    23: { type: 'feriado', event: 'Feriado Turístico' }
                })
            },
            "Diciembre 2026": {
                daysInMonth: 31,
                startDay: 2,
                mision: LEMA_COMUN,
                events: generateMonthTemplate(31, 2, {
                    8: { type: 'feriado', event: 'Inmaculada Concepción' },
                    25: { type: 'feriado', event: 'Navidad' }
                }, false) 
            }
        };

        function App() {
            const [currentMonth, setCurrentMonth] = useState('Marzo 2026');
            const [filter, setFilter] = useState('all');
            const [isTemplateMode, setIsTemplateMode] = useState(false);
            const [selectedProposal, setSelectedProposal] = useState(null);

            const months = Object.keys(calendarData);
            const activeData = calendarData[currentMonth] || calendarData["Marzo 2026"];

            const getEventStyle = (data) => {
                if (!data) return {};
                if (data.type === 'feriado') return { backgroundColor: COLORS.rosaFondo, borderLeft: `4px solid ${COLORS.rojoLadrillo}` };
                if (data.type === 'receso') return { backgroundColor: COLORS.azulReceso, borderLeft: `4px solid ${COLORS.celesteProfe}` };
                if (data.pastoral) return { backgroundColor: COLORS.celesteFondo, borderLeft: `4px solid ${COLORS.azulInst}` };
                return { backgroundColor: COLORS.blanco };
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 print:p-0 print:bg-white">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');
                        @media print {
                            .no-print { display: none !important; }
                            body { -webkit-print-color-adjust: exact !important; }
                            @page { size: landscape; margin: 0.5cm; }
                            .calendar-container { border: none !important; box-shadow: none !important; width: 100% !important; max-width: none !important; }
                        }
                    `}</style>

                    {/* --- Controles --- */}
                    <div className="max-w-7xl mx-auto mb-6 no-print">
                        <div className="bg-white rounded-xl shadow-md border border-slate-200 p-4 flex flex-col lg:flex-row gap-4 items-center justify-between">
                            <div className="flex items-center gap-2 overflow-x-auto pb-2 w-full lg:w-auto">
                                {months.map(m => (
                                    <button 
                                        key={m} 
                                        onClick={() => setCurrentMonth(m)} 
                                        className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${currentMonth === m ? 'bg-blue-900 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {m.split(' ')[0]}
                                    </button>
                                ))}
                            </div>

                            <div className="flex flex-wrap gap-3 items-center">
                                <div className="flex items-center gap-2 bg-slate-100 px-3 py-2 rounded-lg border border-slate-200">
                                    <Filter size={16} className="text-slate-500" />
                                    <select value={filter} onChange={(e) => setFilter(e.target.value)} className="bg-transparent text-sm font-medium outline-none cursor-pointer">
                                        <option value="all">Todos los días</option>
                                        <option value="pastoral">Actividades Pastoral</option>
                                    </select>
                                </div>
                                <button onClick={() => setIsTemplateMode(!isTemplateMode)} className="flex items-center gap-2 px-4 py-2 bg-white border-2 border-slate-800 rounded-lg font-bold text-sm hover:bg-slate-50">
                                    {isTemplateMode ? <Eye size={18} /> : <EyeOff size={18} />}
                                    {isTemplateMode ? 'Ver Datos' : 'Modo Plantilla'}
                                </button>
                                <button onClick={() => window.print()} className="flex items-center gap-2 px-6 py-2 bg-amber-400 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-500 shadow-sm">
                                    <Printer size={18} />
                                    Imprimir / PDF
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* --- Calendario --- */}
                    <div className="max-w-7xl mx-auto bg-white border-2 border-slate-900 shadow-2xl calendar-container overflow-hidden rounded-sm">
                        <div className="flex items-center justify-between p-6 border-b-2 border-slate-900 bg-white">
                            <div className="w-1/4 flex flex-col items-center">
                                <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center border-2 border-slate-200">
                                    <Church size={40} className="text-blue-900" />
                                </div>
                                <span className="text-[10px] font-bold mt-1 text-slate-400 uppercase tracking-widest">Esc. Secundaria</span>
                            </div>
                            <div className="w-2/4 text-center">
                                <h1 className="font-bold text-4xl uppercase tracking-tighter" style={{ color: COLORS.azulInst, fontFamily: "'Oswald', sans-serif" }}>Calendario de Oración</h1>
                                <p className="text-xl font-medium mt-1 text-slate-600 uppercase tracking-widest">{currentMonth}</p>
                                <div className="mt-2 inline-block px-4 py-1 bg-amber-50 border border-amber-200 rounded text-xs italic text-amber-800">{activeData.mision}</div>
                            </div>
                            <div className="w-1/4 text-right" style={{ color: COLORS.azulInst }}>
                                <div className="font-bold text-2xl uppercase" style={{ fontFamily: "'Oswald', sans-serif" }}>San José</div>
                                <div className="text-xs font-bold tracking-tighter uppercase opacity-70">De Libertad</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 border-b-2 border-slate-900 bg-[#C0504D]">
                            {DAYS_OF_WEEK.map(day => (
                                <div key={day} className="py-2 text-center text-[10px] font-bold text-white tracking-widest border-r border-slate-900/30 last:border-r-0 uppercase">{day}</div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7" style={{ gridAutoRows: 'minmax(140px, auto)' }}>
                            {Array.from({ length: activeData.startDay }).map((_, i) => (
                                <div key={`empty-${i}`} className="border-r border-b border-slate-200 bg-slate-50"></div>
                            ))}

                            {Array.from({ length: activeData.daysInMonth }).map((_, i) => {
                                const dayNum = i + 1;
                                const data = activeData.events[dayNum];
                                const isWeekend = (activeData.startDay + i) % 7 === 0 || (activeData.startDay + i) % 7 === 6;
                                let opacity = filter === 'pastoral' && !data?.pastoral ? "opacity-20" : "opacity-100";

                                return (
                                    <div key={dayNum} className={`border-r border-b border-slate-900 flex flex-col transition-all relative ${opacity}`} style={getEventStyle(data)}>
                                        <div className={`font-bold text-base p-2 ${isWeekend ? 'text-slate-400' : 'text-slate-800'}`}>{dayNum}</div>
                                        
                                        <div className="flex-1 flex flex-col px-2 pb-2 gap-1 overflow-hidden">
                                            {data?.type && <div className="text-[10px] font-black uppercase text-center leading-tight">{data.event}</div>}
                                            
                                            {!isWeekend && data?.profe && (
                                                <div className="flex flex-col gap-1">
                                                    <div className="text-[9px] leading-none">
                                                        <span className="font-bold text-slate-400 uppercase text-[8px] block">Resp:</span>
                                                        <span className="font-bold text-blue-800">{isTemplateMode ? '________' : data.profe}</span>
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={() => !isTemplateMode && data.tema !== 'Propuesta del día...' && setSelectedProposal({ day: dayNum, ...data })}
                                                        className={`text-left bg-white/60 p-1.5 rounded border border-slate-900/10 min-h-[45px] hover:bg-white/90 transition-colors group ${isTemplateMode ? 'cursor-default' : 'cursor-pointer'}`}
                                                    >
                                                        <span className="font-bold text-slate-400 uppercase text-[8px] block">Propuesta:</span>
                                                        <p className="text-[9px] leading-tight text-slate-700 italic line-clamp-3">
                                                            {isTemplateMode ? '' : (data.tema === 'Propuesta del día...' ? 'Pendiente' : data.pastoral || 'Ver propuesta...')}
                                                        </p>
                                                        {!isTemplateMode && data.tema !== 'Propuesta del día...' && (
                                                            <span className="text-[8px] text-blue-600 font-bold mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Click para abrir →</span>
                                                        )}
                                                    </button>
                                                </div>
                                            )}

                                            {data?.pastoral && !data?.profe && (
                                                <div className="mt-auto pt-1 border-t border-blue-900/10 text-center">
                                                    <div className="inline-flex items-center gap-1 text-[8px] font-black text-blue-900 uppercase">
                                                        <CalendarIcon size={8} /> {data.pastoral}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* --- Modal de Propuesta (Despliegue) --- */}
                    {selectedProposal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm print:hidden">
                            <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl border-2 border-slate-900 overflow-hidden">
                                <div className="flex items-center justify-between p-4 border-b-2 border-slate-900" style={{ backgroundColor: COLORS.azulInst }}>
                                    <div className="flex items-center gap-3 text-white">
                                        <BookOpen size={24} />
                                        <div>
                                            <h3 className="font-bold text-lg leading-none uppercase tracking-tight">Propuesta de Oración</h3>
                                            <p className="text-xs opacity-80 mt-1 font-medium">{selectedProposal.day} de {currentMonth.split(' ')[0]} - {selectedProposal.profe}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedProposal(null)} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>
                                
                                <div className="p-6 max-h-[70vh] overflow-y-auto bg-slate-50">
                                    {selectedProposal.pastoral && (
                                        <div className="mb-4 inline-flex items-center gap-2 px-3 py-1 bg-blue-100 text-blue-900 rounded-full text-xs font-black uppercase">
                                            <CalendarIcon size={12} /> {selectedProposal.pastoral}
                                        </div>
                                    )}
                                    
                                    <div className="prose prose-slate max-w-none">
                                        {selectedProposal.tema.split('\n\n').map((para, idx) => (
                                            <p key={idx} className={`text-slate-700 leading-relaxed mb-4 text-sm ${para.includes('“') || para.includes('«') || para.includes('Cita:') ? 'italic font-medium bg-white p-4 border-l-4 border-amber-400 rounded-r-lg shadow-sm' : ''} ${para.includes('Pregunta/Acción:') || para.includes('Amén') ? 'font-bold text-blue-900 flex items-center gap-2' : ''}`}>
                                                {(para.includes('Pregunta/Acción:') || para.includes('Amén')) && <PrayingHandsIcon size={18} className="text-amber-500 shrink-0" />}
                                                {para}
                                            </p>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-4 border-t border-slate-200 bg-white flex justify-end">
                                    <button onClick={() => setSelectedProposal(null)} className="px-6 py-2 bg-slate-900 text-white rounded-lg font-bold text-sm hover:bg-slate-800 transition-all">
                                        Cerrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Pie de página para impresión */}
                    <div className="mt-4 hidden print:flex justify-between items-end text-[10px] text-slate-400 px-2 font-medium">
                        <div>Generado para el Equipo Pastoral San José.</div>
                        <div>{LEMA_COMUN}</div>
                        <div>2026</div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
