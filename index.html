                        tema: `“Jesús volvió a Galilea. Cuando llegó, un funcionario real fue a su encuentro y le suplicó que bajara a curar a su hijo, que estaba muy enfermo. Jesús le dijo: ‘Puedes volver tranquilo, tu hijo vive’. El hombre creyó en la palabra de Jesús y se puso en camino.”​ (Juan 4, 46‑50)\n\nEn este pasaje aparece un padre desesperado, que hace lo único que puede hacer: ir a buscar ayuda para su hijo y aferrarse a una palabra que le devuelva la esperanza. Jesús no le da una prueba ni un milagro “a la vista”; le regala solo una frase: “Tu hijo vive”. Lo impresionante es que este hombre se fía de esa palabra y se pone en camino, apoyado únicamente en la confianza.\n\nDios Padre bueno, al comenzar este día queremos ponernos en tu presencia y abrirte el corazón. Te pedimos que, como a ese padre del Evangelio, nos regales la gracia de confiar en la palabra de tu Hijo. Te lo pedimos por Jesucristo nuestro Señor. Amén.`

        function App() {

            const [filter, setFilter] = useState('all');
            const [isTemplateMode, setIsTemplateMode] = useState(false);
            const [selectedProposal, setSelectedProposal] = useState(null);

            const months = Object.keys(calendarData);
            const activeData = calendarData[currentMonth] || calendarData["Marzo 2026"];

            const getEventStyle = (data) => {
                if (!data) return {};
                if (data.type === 'feriado') return { backgroundColor: COLORS.rosaFondo, borderLeft: `4px solid ${COLORS.rojoLadrillo}` };
                if (data.type === 'receso') return { backgroundColor: COLORS.azulReceso, borderLeft: `4px solid ${COLORS.celesteProfe}` };
                if (data.pastoral) return { backgroundColor: COLORS.celesteFondo, borderLeft: `4px solid ${COLORS.azulInst}` };
                return { backgroundColor: COLORS.blanco };
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 print:p-0 print:bg-white">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');
                        @media print {
                            .no-print { display: none !important; }
                            body { -webkit-print-color-adjust: exact !important; }
                            @page { size: landscape; margin: 0.5cm; }
                            .calendar-container { border: none !important; box-shadow: none !important; width: 100% !important; max-width: none !important; }
                        }
                    `}</style>

                    {/* --- Controles --- */}
                    <div className="max-w-7xl mx-auto mb-6 no-print">
                        <div className="bg-white rounded-xl shadow-md border border-slate-200 p-4 flex flex-col lg:flex-row gap-4 items-center justify-between">
                            <div className="flex items-center gap-2 overflow-x-auto pb-2 w-full lg:w-auto">
                                {months.map(m => (
                                    <button 
                                        key={m} 
                                        onClick={() => setCurrentMonth(m)} 
                                        className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${currentMonth === m ? 'bg-blue-900 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {m.split(' ')[0]}
                                    </button>
                                ))}
                            </div>

                            <div className="flex flex-wrap gap-3 items-center">
                                <div className="flex items-center gap-2 bg-slate-100 px-3 py-2 rounded-lg border border-slate-200">
                                    <Filter size={16} className="text-slate-500" />
                                    <select value={filter} onChange={(e) => setFilter(e.target.value)} className="bg-transparent text-sm font-medium outline-none cursor-pointer">
                                        <option value="all">Todos los días</option>
                                        <option value="pastoral">Actividades Pastoral</option>
                                    </select>
                                </div>
                                <button onClick={() => setIsTemplateMode(!isTemplateMode)} className="flex items-center gap-2 px-4 py-2 bg-white border-2 border-slate-800 rounded-lg font-bold text-sm hover:bg-slate-50">
                                    {isTemplateMode ? <Eye size={18} /> : <EyeOff size={18} />}
                                    {isTemplateMode ? 'Ver Datos' : 'Modo Plantilla'}
                                </button>
                                <button onClick={() => window.print()} className="flex items-center gap-2 px-6 py-2 bg-amber-400 text-slate-900 rounded-lg font-bold text-sm hover:bg-amber-500 shadow-sm">
                                    <Printer size={18} />
                                    Imprimir / PDF
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* --- Calendario --- */}
                    <div className="max-w-7xl mx-auto bg-white border-2 border-slate-900 shadow-2xl calendar-container overflow-hidden rounded-sm">
                        <div className="flex items-center justify-between p-6 border-b-2 border-slate-900 bg-white">
                            <div className="w-1/4 flex flex-col items-center">
                                <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center border-2 border-slate-200">
                                    <Church size={40} className="text-blue-900" />
                                </div>
                                <span className="text-[10px] font-bold mt-1 text-slate-400 uppercase tracking-widest">Esc. Secundaria</span>
                            </div>
                            <div className="w-2/4 text-center">
                                <h1 className="font-bold text-4xl uppercase tracking-tighter" style={{ color: COLORS.azulInst, fontFamily: "'Oswald', sans-serif" }}>Calendario de Oración</h1>
                                <p className="text-xl font-medium mt-1 text-slate-600 uppercase tracking-widest">{currentMonth}</p>
                                <div className="mt-2 inline-block px-4 py-1 bg-amber-50 border border-amber-200 rounded text-xs italic text-amber-800">{activeData.mision}</div>
                            </div>
                            <div className="w-1/4 text-right" style={{ color: COLORS.azulInst }}>
                                <div className="font-bold text-2xl uppercase" style={{ fontFamily: "'Oswald', sans-serif" }}>San José</div>
                                <div className="text-xs font-bold tracking-tighter uppercase opacity-70">De Libertad</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 border-b-2 border-slate-900 bg-[#C0504D]">
                            {DAYS_OF_WEEK.map(day => (
                                <div key={day} className="py-2 text-center text-[10px] font-bold text-white tracking-widest border-r border-slate-900/30 last:border-r-0 uppercase">{day}</div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7" style={{ gridAutoRows: 'minmax(140px, auto)' }}>
                            {Array.from({ length: activeData.startDay }).map((_, i) => (
                                <div key={`empty-${i}`} className="border-r border-b border-slate-200 bg-slate-50"></div>
                            ))}

                            {Array.from({ length: activeData.daysInMonth }).map((_, i) => {
                                const dayNum = i + 1;
                                const data = activeData.events[dayNum];
                                const isWeekend = (activeData.startDay + i) % 7 === 0 || (activeData.startDay + i) % 7 === 6;
                                let opacity = filter === 'pastoral' && !data?.pastoral ? "opacity-20" : "opacity-100";

                                return (
                                    <div key={dayNum} className={`border-r border-b border-slate-900 flex flex-col transition-all relative ${opacity}`} style={getEventStyle(data)}>
                                        <div className={`font-bold text-base p-2 ${isWeekend ? 'text-slate-400' : 'text-slate-800'}`}>{dayNum}</div>
                                        
                                        <div className="flex-1 flex flex-col px-2 pb-2 gap-1 overflow-hidden">
                                            {data?.type && <div className="text-[10px] font-black uppercase text-center leading-tight">{data.event}</div>}
                                            
                                            {!isWeekend && data?.profe && (
                                                <div className="flex flex-col gap-1">
                                                    <div className="text-[9px] leading-none">
                                                        <span className="font-bold text-slate-400 uppercase text-[8px] block">Resp:</span>
                                                        <span className="font-bold text-blue-800">{isTemplateMode ? '________' : data.profe}</span>
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={() => !isTemplateMode && data.tema !== 'Propuesta del día...' && setSelectedProposal({ day: dayNum, ...data })}
                                                        className={`text-left bg-white/60 p-1.5 rounded border border-slate-900/10 min-h-[45px] hover:bg-white/90 transition-colors group ${isTemplateMode ? 'cursor-default' : 'cursor-pointer'}`}
                                                    >
                                                        <span className="font-bold text-slate-400 uppercase text-[8px] block">Propuesta:</span>
                                                        <p className="text-[9px] leading-tight text-slate-700 italic line-clamp-3">
                                                            {isTemplateMode ? '' : (data.tema === 'Propuesta del día...' ? 'Pendiente' : data.pastoral || 'Ver propuesta...')}
                                                        </p>
                                                        {!isTemplateMode && data.tema !== 'Propuesta del día...' && (
                                                            <span className="text-[8px] text-blue-600 font-bold mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Click para abrir →</span>
                                                        )}
                                                    </button>
                                                </div>
                                            )}

                                            {data?.pastoral && !data?.profe && (
                                                <div className="mt-auto pt-1 border-t border-blue-900/10 text-center">
                                                    <div className="inline-flex items-center gap-1 text-[8px] font-black text-blue-900 uppercase">
                                                        <CalendarIcon size={8} /> {data.pastoral}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* --- Modal de Propuesta (Despliegue) --- */}
                    {selectedProposal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm print:hidden">
                            <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl border-2 border-slate-900 overflow-hidden">
                                <div className="flex items-center justify-between p-4 border-b-2 border-slate-900" style={{ backgroundColor: COLORS.azulInst }}>
                                    <div className="flex items-center gap-3 text-white">
                                        <BookOpen size={24} />
                                        <div>
                                            <h3 className="font-bold text-lg leading-none uppercase tracking-tight">Propuesta de Oración</h3>
                                            <p className="text-xs opacity-80 mt-1 font-medium">{selectedProposal.day} de {currentMonth.split(' ')[0]} - {selectedProposal.profe}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedProposal(null)} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>
                                
                                <div className="p-6 max-h-[70vh] overflow-y-auto bg-slate-50">
                                    {selectedProposal.pastoral && (
                                        <div className="mb-4 inline-flex items-center gap-2 px-3 py-1 bg-blue-100 text-blue-900 rounded-full text-xs font-black uppercase">
                                            <CalendarIcon size={12} /> {selectedProposal.pastoral}
                                        </div>
                                    )}
                                    
                                    <div className="prose prose-slate max-w-none">
                                        {selectedProposal.tema.split('\n\n').map((para, idx) => (
                                            <p key={idx} className={`text-slate-700 leading-relaxed mb-4 text-sm ${para.includes('“') || para.includes('«') || para.includes('Cita:') ? 'italic font-medium bg-white p-4 border-l-4 border-amber-400 rounded-r-lg shadow-sm' : ''} ${para.includes('Pregunta/Acción:') || para.includes('Amén') ? 'font-bold text-blue-900 flex items-center gap-2' : ''}`}>
                                                {(para.includes('Pregunta/Acción:') || para.includes('Amén')) && <PrayingHandsIcon size={18} className="text-amber-500 shrink-0" />}
                                                {para}
                                            </p>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-4 border-t border-slate-200 bg-white flex justify-end">
                                    <button onClick={() => setSelectedProposal(null)} className="px-6 py-2 bg-slate-900 text-white rounded-lg font-bold text-sm hover:bg-slate-800 transition-all">
                                        Cerrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Pie de página para impresión */}
                    <div className="mt-4 hidden print:flex justify-between items-end text-[10px] text-slate-400 px-2 font-medium">
                        <div>Generado para el Equipo Pastoral San José.</div>
                        <div>{LEMA_COMUN}</div>
                        <div>2026</div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
